data_mapping:
  action_column: Action to take
  cost_column: Cost for Replacement $
  device_name_column: Device Name
  edition_column: LTSC or Enterprise
  os_column: Current OS Build
  site_column: Site Location
  user_columns:
    current: Current User Logged On
    last: Last User Logged On
esol_categories:
  esol_2024:
    action_value: Urgent Replacement
    description: Critical devices requiring immediate replacement
    target_date: '2025-06-30'
  esol_2025:
    action_value: Replace by 14/10/2025
    description: Devices to be replaced by October 2025
    target_date: '2025-10-14'
  esol_2026:
    action_value: Replace by 11/11/2026
    description: Future replacement devices
    target_date: '2026-11-11'
kiosk_detection:
  case_sensitive: false
  logic: OR
  device_name_patterns:
  - SHP
  user_loggedon_patterns:
  - Kiosk
  - kiosk
windows11_compatibility:
  # KPI Target: 100% of eligible EUCs upgraded by end of Oct 2025
  kpi_target_date: '2025-10-31'
  kpi_target_percentage: 100
  
  # Windows 11 scope criteria:
  # 1. Latest OS Supported contains "Win11"
  # 2. Enterprise or LTSC = "Enterprise" 
  # 3. Action to take is any EXCEPT ESOL 2024 or ESOL 2025
  
  # Only Enterprise EUCs are targeted for Windows 11 upgrade
  target_editions:
  - Enterprise
  
  # LTSC devices are excluded from Windows 11 push
  exclude_editions:
  - LTSC
  
  # ESOL categories that are EXCLUDED from Windows 11 upgrade (replaced instead)
  excluded_actions:
  - esol_2024  # Urgent Replacement - replaced with Win11 devices
  - esol_2025  # Replace by 14/10/2025 - replaced with Win11 devices
  
  # Windows 11 OS detection patterns
  win11_patterns:
  - Win11
  
  # Migration categories for replacement pathway (not upgrade)
  migration_categories:
  - esol_2024  # Replace with Win11 devices
  - esol_2025  # Replace with Win11 devices
