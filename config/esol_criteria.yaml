data_mapping:
  action_column: Action to take
  cost_column: Estimate Cost for Replacement $
  device_name_column: Device Name
  edition_column: Enterprise or LTSC
  os_column: OS Build
  site_column: Site Location
  user_columns:
    current: Current User LoggedOn
    last: Last User LoggedOn
esol_categories:
  esol_2024:
    action_value: Urgent Replacement
    description: Critical devices requiring immediate replacement
    target_date: '2025-06-30'
  esol_2025:
    action_value: Replace by 14/10/2025
    description: Devices to be replaced by October 2025
    target_date: '2025-10-14'
  esol_2026:
    action_value: Replace by 11/11/2026
    description: Future replacement devices
    target_date: '2026-11-11'
kiosk_detection:
  case_sensitive: false
  logic: OR
  device_name_patterns:
  - SHP
  user_loggedon_patterns:
  - Kiosk
  - kiosk
windows11_compatibility:
  # These categories ARE the Windows 11 migration pathway (via replacement)
  migration_categories:
  - esol_2024  # Replace with Win11 devices
  - esol_2025  # Replace with Win11 devices
  
  # Only Enterprise EUCs are targeted for OS upgrade
  target_editions:
  - Enterprise
  
  # LTSC devices are excluded from Win11 push
  exclude_editions:
  - LTSC
  
  win11_patterns:
  - Win11
